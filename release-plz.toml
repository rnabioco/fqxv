# release-plz configuration.
#
# The workspace publishes as a set: release-plz resolves the dependency order
# (fqxv-rans / fqxv-range → the codecs → fqxv → fqxv-cli) automatically.

[workspace]
# One GitHub release per version tag; the `Release` workflow builds the CLI
# binaries for it.
git_release_enable = true
git_tag_enable = true
# Keep crate versions in lockstep so the workspace ships coherently.
dependencies_update = true

# The Python bindings ship as PyPI wheels (see .github/workflows/wheels.yml), not
# on crates.io. `publish = false` in its Cargo.toml keeps `cargo publish` away;
# this suppresses release-plz's changelog/tag churn for it. It still inherits the
# lockstep version bump via `version.workspace = true`, so the wheel version
# tracks the released crates.
[[package]]
name = "fqxv-python"
release = false
