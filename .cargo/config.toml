# Repo-local build flags (not inherited by downstream consumers of the
# published crates — this only affects builds inside this workspace).
#
# Baseline: `x86-64-v3` = SSE4.2 + AVX + AVX2 + FMA + BMI1/BMI2 + POPCNT + F16C.
# The Alpine `amilan`/`acpu` partition (AMD EPYC 7713P, Zen 3) supports all of
# v3. Features above v3 (AVX-512, etc.) are NOT pinned — the EPYC 7713P has no
# AVX-512 anyway, and portable hot kernels use `#[target_feature]` + runtime
# `is_x86_feature_detected!` dispatch (see fqxv-rans) rather than a global bump.
#
# Only applies to the x86_64 GNU target used for local builds and benchmarking.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3"]
