name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab / `gh workflow run`

# Least privilege: CI only ever reads the tree.
permissions:
  contents: read

# Cancel superseded runs on the same ref, but never on main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Trim proptest iterations on CI: the heavy round-trip proptests do a full
  # codec encode/decode per case, and 256 makes them the slowest tests. 64 is a
  # solid per-push regression net — proptest varies its corpus across runs, so
  # coverage accrues over CI history — and local runs keep the 256 default.
  # Tests that set an explicit `with_cases(...)` are unaffected.
  PROPTEST_CASES: "64"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      # `.cargo/config.toml` links with lld (proc-macros/build scripts link
      # even under `cargo check`); install it.
      - run: sudo apt-get update && sudo apt-get install -y lld
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --features fqxv-rans/bench

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      # `.cargo/config.toml` links with lld; install it for the build step.
      - run: sudo apt-get update && sudo apt-get install -y lld
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --profile ci
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-test
          path: target/nextest/ci/junit.xml
          retention-days: 14

  doctest:
    name: Doctest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # nextest does not run doctests; keep them alive on a separate job.
    steps:
      - uses: actions/checkout@v7
      # `.cargo/config.toml` links with lld; install it for the build step.
      - run: sudo apt-get update && sudo apt-get install -y lld
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --doc --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      # `.cargo/config.toml` links with lld (proc-macros/build scripts link
      # even under `cargo clippy`); install it.
      - run: sudo apt-get update && sudo apt-get install -y lld
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --features fqxv-rans/bench

  msrv:
    name: MSRV (1.95)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      # `.cargo/config.toml` links with lld (proc-macros/build scripts link
      # even under `cargo check`); install it.
      - run: sudo apt-get update && sudo apt-get install -y lld
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # fqxv-python (the PyPI bindings) is otherwise only built at release time
    # (wheels.yml). Build the extension and run its smoke tests here so a broken
    # binding fails a PR rather than first surfacing when a release tag is cut.
    steps:
      - uses: actions/checkout@v7
      # `.cargo/config.toml` links with lld; install it for the build steps.
      - run: sudo apt-get update && sudo apt-get install -y lld
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      # test_smoke.py compresses a tiny fixture with the CLI (target/debug/fqxv).
      - run: cargo build -p fqxv-cli
      - name: Build and install the bindings
        run: |
          python -m pip install --upgrade maturin pytest
          maturin build --out dist --manifest-path crates/fqxv-python/Cargo.toml
          python -m pip install dist/*.whl
      - name: Smoke-test the bindings
        env:
          FQXV_BIN: target/debug/fqxv
        run: python -m pytest crates/fqxv-python/tests/ -v
