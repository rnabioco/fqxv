name: release-plz

# Automates crates.io releases: opens a release PR that bumps versions and
# updates changelogs from conventional commits, and on merge publishes the
# workspace crates to crates.io in dependency order and tags the release
# (which the `Release` workflow then turns into CLI binary artifacts).
#
# Requires a `CARGO_REGISTRY_TOKEN` repository secret.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Never run two release automations at once.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.repository == 'rnabioco/fqxv'
    # Expose "is the publish token configured?" to a step guard so main stays
    # green until crates.io publishing is deliberately enabled.
    env:
      HAS_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - if: env.HAS_TOKEN == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: env.HAS_TOKEN == 'true'
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - if: env.HAS_TOKEN != 'true'
        run: echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io release. See release-plz.toml."
