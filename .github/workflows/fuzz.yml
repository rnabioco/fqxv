name: Fuzz

# Non-blocking: a separate workflow from CI, so it never gates a PR. See
# fuzz/README.md.
#
# The weekly `schedule:` runs only the targets verified OOM-clean (container,
# rans, tokenizer). The other decoders (seq, fqzcomp, reorder) still surface
# decompression-bomb OOMs — a header can declare a large output the codec
# allocates for, up to the RSS limit, before erroring — so they would make a
# scheduled run go red. They stay available on manual dispatch, which runs all
# six; bounding those decode allocations by input size (issue #90) is what lets
# them join the schedule.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — verified-clean targets only
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to fuzz each target"
        required: false
        default: "120"

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Let the sanitizer return null on an oversized/failed allocation instead of
  # aborting, so the decoders' `try_reserve` guards can reject a corrupt length
  # gracefully (as they do in production). A genuine *infallible* over-allocation
  # still aborts via `handle_alloc_error`, which libFuzzer catches.
  ASAN_OPTIONS: allocator_may_return_null=1

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Schedule: only the verified OOM-clean targets. Manual dispatch: all six.
        target: ${{ (github.event_name == 'schedule') && fromJSON('["container","rans","tokenizer"]') || fromJSON('["container","rans","tokenizer","seq","fqzcomp","reorder"]') }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@cargo-fuzz
      - name: Seed corpus with sample archives (container only)
        if: matrix.target == 'container'
        run: |
          mkdir -p fuzz/corpus/container
          cp *.fqxv fuzz/corpus/container/ 2>/dev/null || true
      # `-malloc_limit_mb=0` (with ASAN_OPTIONS=allocator_may_return_null=1) stops
      # the sanitizer aborting when a decoder's `try_reserve` asks the allocator
      # for a corrupt-length-sized block — that returns an error, not a crash. A
      # genuine *infallible* over-allocation still aborts via `handle_alloc_error`;
      # `-rss_limit_mb` bounds real growth (finite so a bomb is a clean libFuzzer
      # OOM + reproducer, not an OS OOM-kill); `-timeout` caps a single slow unit
      # so a pathological input can't hang the run for the default 20 minutes.
      - name: Fuzz
        run: >
          cargo +nightly fuzz run ${{ matrix.target }} --
          -max_total_time=${{ github.event.inputs.max_total_time || '120' }}
          -rss_limit_mb=4096
          -malloc_limit_mb=0
          -timeout=30
      - name: Upload crash reproducer
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
